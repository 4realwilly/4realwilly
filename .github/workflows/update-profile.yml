name: Update Profile + Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update Age + Coding Years
        run: |
          BIRTHDATE="2009-06-19"
          CODING_START_YEAR=2022

          CURRENT_YEAR=$(date +%Y)
          TODAY=$(date +%s)
          BIRTH=$(date -d "$BIRTHDATE" +%s)

          AGE=$(( (TODAY - BIRTH) / 31556952 ))
          CODING_YEARS=$(( CURRENT_YEAR - CODING_START_YEAR ))

          sed -i "s/<!-- AGE_START -->.*<!-- AGE_END -->/<!-- AGE_START -->$AGE<!-- AGE_END -->/" README.md
          sed -i "s/<!-- CODING_YEARS_START -->.*<!-- CODING_YEARS_END -->/<!-- CODING_YEARS_START -->$CODING_YEARS<!-- CODING_YEARS_END -->/" README.md

      - name: Commit README changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update profile stats"
          git push

  snake:
    runs-on: ubuntu-latest
    needs: update

    steps:
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: 4realwilly
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg

      - name: Publish Snake
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
